<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSU Match 竞赛知识库</title>
    <meta
      name="description"
      content="江苏大学竞赛知识库。支持按学院、专业、赛事等级、赛制、月份、状态和推荐等级检索，并查看官网、通知、报名入口与原始 Markdown 条目。"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <div class="brand-block">
          <a class="brand" href="#/home" aria-label="返回首页">
            <span class="brand-mark">JSU</span>
            <span class="brand-copy">
              <strong>JSU Match</strong>
              <small>江苏大学竞赛知识库</small>
            </span>
          </a>
          <p class="brand-note">按学院与专业切换竞赛视角，保留结构化结论与原始调研条目。</p>
        </div>

        <nav class="primary-nav" aria-label="主导航">
          <a class="nav-link" data-nav-link href="#/home">门户</a>
          <a class="nav-link" data-nav-link href="#/competitions">赛事总览</a>
        </nav>

        <div class="context-controls">
          <label class="control">
            <span>学院</span>
            <select id="college-select"></select>
          </label>
          <label class="control">
            <span>专业</span>
            <select id="major-select"></select>
          </label>
          <form class="search-shell" id="search-form">
            <input
              id="search-input"
              type="search"
              placeholder="搜索比赛名、赛制、标签或专业评语"
              autocomplete="off"
            />
            <button class="search-button" type="submit">搜索</button>
          </form>
          <button class="ghost-button" id="share-context-button" type="button">分享当前视图</button>
        </div>
      </header>

      <section class="context-bar">
        <div id="context-breadcrumb" class="context-breadcrumb"></div>
        <div id="context-summary" class="context-summary"></div>
      </section>

      <main id="app" class="app-main" aria-live="polite"></main>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="./assets/vendor/marked.umd.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
