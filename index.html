<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSU Match 2.0</title>
    <meta
      name="description"
      content="江苏大学竞赛 Wiki。按学院、专业、赛事等级、赛道、月份、状态和推荐等级筛选，查看官网、通知、报名入口与完整调研条目。"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="site-noise" aria-hidden="true"></div>
    <div class="site-grid" aria-hidden="true"></div>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="#/home" aria-label="返回首页">
          <span class="brand-mark">JSU</span>
          <span class="brand-copy">
            <strong>Match 2.0</strong>
            <small>College-to-Major Competition Wiki</small>
          </span>
        </a>

        <nav class="primary-nav" aria-label="主导航">
          <a class="nav-link" data-nav-link href="#/home">首页</a>
          <a class="nav-link" data-nav-link href="#/competitions">赛事库</a>
        </nav>

        <div class="context-controls">
          <label class="control">
            <span>学院</span>
            <select id="college-select"></select>
          </label>
          <label class="control">
            <span>专业</span>
            <select id="major-select"></select>
          </label>
          <form class="search-shell" id="search-form">
            <input
              id="search-input"
              type="search"
              placeholder="搜索比赛名、赛制、标签、推荐理由"
              autocomplete="off"
            />
            <button class="search-button" type="submit">搜索</button>
          </form>
          <button class="ghost-button" id="share-context-button" type="button">分享当前视图</button>
        </div>
      </header>

      <section class="context-bar">
        <div id="context-breadcrumb" class="context-breadcrumb"></div>
        <div id="context-summary" class="context-summary"></div>
      </section>

      <main id="app" class="app-main" aria-live="polite"></main>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="./assets/vendor/marked.umd.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
